name: Native release

on:
  push:
    tags:
      - 'v0.2.0'
      - 'v0.2.0-*'

concurrency:
  group: native-preview-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    name: Build canonical native release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout signed tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify immutable signed tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/verify-native-release-tag.sh

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Pass native cutover checks
        run: |
          test -z "$(gofmt -l cmd internal)"
          go vet ./...
          go test ./... -count=1

      - name: Build CGO-disabled archives and smoke-test Linux x86-64
        env:
          CGO_ENABLED: '0'
        run: >-
          go run ./internal/release/cmd/native-preview
          --version "${GITHUB_REF_NAME#v}"
          --output native-dist
          --notes native-preview-notes.md
          --homebrew-formula homebrew/open-skills.rb
          --scoop-manifest scoop/open-skills.json

      - name: Verify checked production package metadata
        if: github.ref_name == 'v0.2.0'
        run: |
          cmp Formula/open-skills.rb homebrew/open-skills.rb
          cmp bucket/open-skills.json scoop/open-skills.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.0.6'

      - name: Attest archive build provenance
        id: provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: native-dist/checksums.txt

      - name: Attach provenance and keyless signatures
        env:
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
        run: |
          set -euo pipefail
          cp "${PROVENANCE_BUNDLE}" native-dist/provenance.sigstore.json
          for subject in native-dist/open-skills_*.tar.gz native-dist/open-skills_*.zip native-dist/checksums.txt; do
            cosign sign-blob --yes --bundle "${subject}.sigstore.json" "${subject}"
          done

      - name: Verify canonical targets, checksums, signatures, and provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          go run ./internal/release/cmd/verify-native-release --tag "${GITHUB_REF_NAME}" --output native-dist
          (
            cd native-dist
            sha256sum --check checksums.txt
          )

          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/native-preview.yml@refs/tags/${GITHUB_REF_NAME}"
          workflow="${GITHUB_REPOSITORY}/.github/workflows/native-preview.yml"
          for subject in native-dist/open-skills_*.tar.gz native-dist/open-skills_*.zip; do
            cosign verify-blob \
              --bundle "${subject}.sigstore.json" \
              --certificate-identity "${identity}" \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              "${subject}"
            gh attestation verify "${subject}" \
              --bundle native-dist/provenance.sigstore.json \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${workflow}" \
              --deny-self-hosted-runners
          done
          cosign verify-blob \
            --bundle native-dist/checksums.txt.sigstore.json \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            native-dist/checksums.txt

      - name: Stage verified release and Homebrew smoke inputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-preview-${{ github.ref_name }}
          path: |
            native-dist
            native-preview-notes.md
            homebrew/open-skills.rb
            scoop/open-skills.json
          if-no-files-found: error
          retention-days: 1

  homebrew:
    name: Smoke-test supported Homebrew package
    needs: build
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout signed tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download verified release and Homebrew smoke inputs
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: native-preview-${{ github.ref_name }}
          path: .

      - name: Require macOS ARM64
        run: test "$(uname -m)" = arm64

      - name: Smoke-test Homebrew install and upgrade
        run: |
          artifact="native-dist/open-skills_${GITHUB_REF_NAME#v}_darwin_arm64.tar.gz"
          OPEN_SKILLS_HOMEBREW_ARTIFACT="$artifact" scripts/homebrew-smoke.sh homebrew/open-skills.rb

  scoop:
    name: Smoke-test experimental Windows Scoop package
    needs: build
    runs-on: windows-2025
    permissions:
      contents: read

    steps:
      - name: Checkout signed tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Checkout pinned Scoop core
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          repository: ScoopInstaller/Scoop
          ref: b588a06e41d920d2123ec70aee682bae14935939
          path: scoop-core
          persist-credentials: false

      - name: Download verified release and Scoop smoke inputs
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: native-preview-${{ github.ref_name }}
          path: .

      - name: Validate manifest and smoke-test Scoop
        shell: pwsh
        run: |
          $artifact = "native-dist/open-skills_${env:GITHUB_REF_NAME.Substring(1)}_windows_amd64.zip"
          scripts/scoop-smoke.ps1 scoop/open-skills.json $artifact scoop-core

  production-approval:
    name: Approve production native cutover
    if: github.ref_name == 'v0.2.0'
    needs: [build, homebrew, scoop]
    runs-on: ubuntu-latest
    environment: native-production
    permissions:
      contents: read

    steps:
      - name: Record protected maintainer approval
        run: echo "Production cutover approved after canonical artifact, Homebrew, Scoop, and platform verification."

  release:
    name: Publish canonical native release
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.homebrew.result == 'success' &&
      needs.scoop.result == 'success' &&
      (needs['production-approval'].result == 'success' || needs['production-approval'].result == 'skipped')
    needs: [build, homebrew, scoop, production-approval]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout signed tag
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download verified release inputs
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: native-preview-${{ github.ref_name }}
          path: .

      - name: Revalidate staged release bundle
        run: |
          set -euo pipefail
          go run ./internal/release/cmd/verify-native-release --tag "${GITHUB_REF_NAME}" --output native-dist
          (
            cd native-dist
            sha256sum --check checksums.txt
          )

      - name: Revalidate tag and publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/verify-native-release-tag.sh
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "release ${GITHUB_REF_NAME} already exists; refusing to replace immutable artifacts" >&2
            exit 1
          fi
          release_title="open-skills ${GITHUB_REF_NAME} native release"
          release_args=()
          if [[ "${GITHUB_REF_NAME}" != "v0.2.0" ]]; then
            release_title="open-skills ${GITHUB_REF_NAME} native preview"
            release_args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            native-dist/* \
            --verify-tag \
            --title "${release_title}" \
            --notes-file native-preview-notes.md \
            "${release_args[@]}"
