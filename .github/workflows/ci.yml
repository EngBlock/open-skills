name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Tests
        run: go test ./... -count=1

      - name: Network-disabled native compatibility corpus
        run: |
          GO_BIN="$(command -v go)"
          MOD_CACHE="${RUNNER_TEMP}/open-skills-go-mod-cache"
          GOMODCACHE="$MOD_CACHE" go mod download
          sudo unshare --net -- sh -c '
            ip link set lo up
            export PATH="$(dirname "$1"):/usr/sbin:/usr/bin:/bin"
            export GOCACHE=/tmp/open-skills-go-cache
            export GOMODCACHE="$2"
            export GOPROXY=off GOSUMDB=off GOTOOLCHAIN=local
            exec "$1" test ./internal/compatibility -run "TestNativeGoldenCorpus|TestNativeShell|TestD02OfflineShellHasNoNetworkOrSubprocessDependencies" -count=1
          ' sh "$GO_BIN" "$MOD_CACHE"

      - name: Build standalone executable
        env:
          CGO_ENABLED: '0'
        run: mkdir -p .native-dist && go build -trimpath -o .native-dist/open-skills ./cmd/open-skills

      - name: Smoke test standalone executable
        env:
          PATH: ''
        run: ./.native-dist/open-skills

      - name: Verify native executable name
        run: test "$(find .native-dist -maxdepth 1 -type f -printf '%f\n')" = open-skills

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Tests
        run: go test ./... -count=1

      - name: Build standalone executable
        env:
          CGO_ENABLED: '0'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .native-dist | Out-Null
          go build -trimpath -o .native-dist/open-skills.exe ./cmd/open-skills

      - name: Smoke test standalone executable
        run: ./.native-dist/open-skills.exe

      - name: Verify native executable name
        shell: pwsh
        run: |
          $files = @(Get-ChildItem .native-dist -File | Select-Object -ExpandProperty Name)
          if ($files.Count -ne 1 -or $files[0] -ne 'open-skills.exe') { throw "unexpected native artifacts: $files" }
