name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

jobs:
  go:
    name: Go validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      # The release package test builds every target once and smoke-tests the
      # production Linux executable as part of this single complete suite.
      - name: Tests, production build, and cross-compilation
        run: go test ./... -count=1

      # Linux network namespaces are the portable enforcement boundary for the
      # corpus's explicit no-network/no-undisclosed-subprocess contract.
      - name: Network-disabled native compatibility corpus
        run: |
          GO_BIN="$(command -v go)"
          MOD_CACHE="${RUNNER_TEMP}/open-skills-go-mod-cache"
          GOMODCACHE="$MOD_CACHE" go mod download
          sudo unshare --net -- sh -c '
            ip link set lo up
            export PATH="$(dirname "$1"):/usr/sbin:/usr/bin:/bin"
            export GOCACHE=/tmp/open-skills-go-cache
            export GOMODCACHE="$2"
            export GOPROXY=off GOSUMDB=off GOTOOLCHAIN=local
            exec "$1" test ./internal/compatibility -run "TestNativeGoldenCorpus|TestNativeShell|TestD02OfflineShellHasNoNetworkOrSubprocessDependencies" -count=1
          ' sh "$GO_BIN" "$MOD_CACHE"
