name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['22.20.0', '24', '26']
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: oxfmt
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '24'
        run: pnpm format:check

      - name: Tests
        run: pnpm test

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

  native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)"

      - name: Vet
        run: go vet ./...

      - name: Tests
        run: go test ./...

      - name: D02 network-disabled shell tests
        run: |
          GO_BIN="$(command -v go)"
          sudo unshare --net -- sh -c '
            ip link set lo up
            export PATH="$(dirname "$1"):/usr/sbin:/usr/bin:/bin"
            export GOCACHE=/tmp/open-skills-go-cache
            exec "$1" test ./internal/compatibility -run "TestNativeShell|TestD02OfflineShellHasNoNetworkOrSubprocessDependencies" -count=1
          ' sh "$GO_BIN"

      - name: Build standalone executable
        env:
          CGO_ENABLED: '0'
        run: mkdir -p .native-dist && go build -trimpath -o .native-dist/open-skills ./cmd/open-skills

      - name: Smoke test standalone executable
        env:
          PATH: ''
        run: ./.native-dist/open-skills

      - name: Verify native executable name
        run: test "$(find .native-dist -maxdepth 1 -type f -printf '%f\n')" = open-skills

  native-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Tests
        run: go test ./...

      - name: Build standalone executable
        env:
          CGO_ENABLED: '0'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .native-dist | Out-Null
          go build -trimpath -o .native-dist/open-skills.exe ./cmd/open-skills

      - name: Smoke test standalone executable
        run: ./.native-dist/open-skills.exe

      - name: Verify native executable name
        shell: pwsh
        run: |
          $files = @(Get-ChildItem .native-dist -File | Select-Object -ExpandProperty Name)
          if ($files.Count -ne 1 -or $files[0] -ne 'open-skills.exe') { throw "unexpected native artifacts: $files" }
